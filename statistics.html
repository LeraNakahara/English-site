<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUp English - Статистика</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Aleo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ХЕДДЕР -->
    <header class="site-header">
        <div class="header-container">
            <a href="index.html" class="logo-link">
                <img src="images/icon_header.png" alt="StepUp English Icon" class="header-icon">
                <span class="logo-text">StepUp English</span>
            </a>
            <nav class="header-nav">
                <a href="statistics.html" class="nav-link">Статистика</a>
                <a href="test.html" class="nav-link">Тест</a>
                <a href="about.html" class="nav-link">Информация</a>
            </nav>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ СТРАНИЦЫ СТАТИСТИКИ -->
    <main class="statistics-page">
        
        <!-- БЛОК 1: с иконкой и количеством прошедших -->
        <section class="about-hero">
            <div class="hero-card about-hero-card">
                <div class="hero-icon">
                    <img src="images/icon.png" alt="Иконка">
                </div>
                <div class="hero-text">
                    <div class="stat-hero-number">12 547</div>
                    <div class="stat-hero-text">человек уже прошли тест<br>StepUp English!</div>
                </div>
            </div>
        </section>

        <!-- БЛОК 2: Заголовок статистики -->
        <section class="stats-title-section">
            <h2 class="stats-main-title">ОБЩАЯ СТАТИСТИКА ПОЛЬЗОВАТЕЛЕЙ</h2>
        </section>

        <!-- БЛОК 3: Таблица с уровнями и полосками -->
        <section class="stats-table-section">
            <div class="stats-container">
                
                <!-- Уровень A1 -->
                <div class="stat-row">
                    <div class="stat-level">A1</div>
                    <div class="stat-percent">8%</div>
                    <div class="stat-bar-wrapper">
                        <div class="stat-bar" style="width: 25%;"></div>
                    </div>
                </div>

                <!-- Уровень A2 -->
                <div class="stat-row">
                    <div class="stat-level">A2</div>
                    <div class="stat-percent">15%</div>
                    <div class="stat-bar-wrapper">
                        <div class="stat-bar" style="width: 47%;"></div>
                    </div>
                </div>

                <!-- Уровень B1 -->
                <div class="stat-row">
                    <div class="stat-level">B1</div>
                    <div class="stat-percent">32%</div>
                    <div class="stat-bar-wrapper">
                        <div class="stat-bar" style="width: 100%;"></div>
                    </div>
                </div>

                <!-- Уровень B2 -->
                <div class="stat-row">
                    <div class="stat-level">B2</div>
                    <div class="stat-percent">28%</div>
                    <div class="stat-bar-wrapper">
                        <div class="stat-bar" style="width: 88%;"></div>
                    </div>
                </div>

                <!-- Уровень C1 -->
                <div class="stat-row">
                    <div class="stat-level">C1</div>
                    <div class="stat-percent">12%</div>
                    <div class="stat-bar-wrapper">
                        <div class="stat-bar" style="width: 38%;"></div>
                    </div>
                </div>

                <!-- Уровень C2 -->
                <div class="stat-row">
                    <div class="stat-level">C2</div>
                    <div class="stat-percent">5%</div>
                    <div class="stat-bar-wrapper">
                        <div class="stat-bar" style="width: 16%;"></div>
                    </div>
                </div>

            </div>
        </section>

        <!-- БЛОК 4: Кнопка "Пройти тест" с котиком -->
        <section class="stats-test-btn-section">
            <a href="test.html" class="stats-test-btn">
                <img src="images/cat_3.png" alt="Котик" class="stats-btn-cat">
                <span class="stats-btn-text">Пройти тест</span>
            </a>
        </section>

    </main>

    <!-- ПОДВАЛ -->
    <footer class="site-footer">
        <div class="footer-container">
            <p class="footer-text">Сообщите нам, если возникли трудности!</p>
            <div class="social-icons">
                <a href="#" class="social-link">
                    <img src="images/wat.png" alt="WhatsApp">
                </a>
                <a href="#" class="social-link">
                    <img src="images/vk.png" alt="ВКонтакте">
                </a>
                <a href="#" class="social-link">
                    <img src="images/tg.png" alt="Telegram">
                </a>
            </div>
        </div>
    </footer>

</body>
</html>
